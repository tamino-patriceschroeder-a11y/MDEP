<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Wort- & Zeichenzähler</title>
    <style>
        body {background-color: #1e1e1e; color: white;}
        .counter-container { padding: 15px; font-family: sans-serif; border-radius: 10px; background-color: #3e3e3e;}
        textarea { width: 100%; height: 150px; margin-bottom: 10px; padding: 10px; box-sizing: border-box; border-radius: 10px; background-color: #6e6e6e;}
        .stats { font-weight: bold;}
    </style>
</head>
<body>
    <div class="counter-container">
        <textarea id="textInput" placeholder="Text hier eingeben..." oninput="updateStats()"></textarea>
        <div class="stats">
            Wörter: <span id="wordCount">0</span> |
            Zeichen (inkl. Leerzeichen): <span id="charCount">0</span>
        </div>
    </div>

    <script>
        function updateStats() {
            const text = document.getElementById('textInput').value;
            const charCount = text.length;
            
            // Zählt Wörter basierend auf Leerzeichen (einfache Methode)
            const words = text.trim().split(/\s+/);
            const wordCount = text.trim() === "" ? 0 : words.length;

            document.getElementById('wordCount').textContent = wordCount;
            document.getElementById('charCount').textContent = charCount;
        }
    </script>
</body>
</html>
