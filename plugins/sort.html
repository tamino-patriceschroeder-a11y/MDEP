
    <html>
      <head><style></style></head>
      <body><!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text-Profi-Tool 2025 - inkl. Live-Vorschau</title>
    <style>
        :root { --primary: #007bff; --success: #28a745; --bg: #f4f4f9; --card: #ffffff; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; max-width: 900px; margin: 20px auto; padding: 20px; background-color: var(--bg); color: #333; }
        .container { background: var(--card); padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { margin-top: 0; color: #222; border-bottom: 2px solid var(--primary); padding-bottom: 10px; }
        label { font-weight: bold; display: block; margin-bottom: 5px; font-size: 0.9rem; }
        textarea { width: 100%; height: 180px; margin-bottom: 15px; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem; box-sizing: border-box; font-family: monospace; }
        .section { margin-bottom: 25px; padding: 15px; border-radius: 8px; background: #fafafa; border: 1px solid #eee; }
        .grid-controls { display: flex; gap: 10px; align-items: center; margin-bottom: 10px; flex-wrap: wrap; }
        .replace-box { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        .replace-box input { padding: 10px; border: 1px solid #ccc; border-radius: 6px; flex: 1; min-width: 150px; }
        .counter-badge { background: #e9ecef; padding: 2px 8px; border-radius: 12px; font-size: 0.8rem; font-weight: bold; color: var(--primary); }
        button { padding: 10px 18px; cursor: pointer; border: none; border-radius: 6px; background-color: var(--primary); color: white; font-weight: 600; transition: all 0.2s; }
        button:hover { background-color: #0056b3; transform: translateY(-1px); }
        button.copy { background-color: var(--success); width: 100%; margin-top: 10px; }
        .highlight-info { font-size: 0.85rem; margin-top: 8px; color: #666; }
    </style>
</head>
<body>

<div class="container">
    <h2>Text-Sortierer & Editor 2025</h2>
    
    <!-- Eingabe-Sektion -->
    <div class="section">
        <label for="input">1. Text eingeben:</label>
        <textarea id="input" placeholder="Zeile 1
Zeile 2..."></textarea>
        
        <div class="grid-controls">
            <button onclick="processSort('asc')">Sortieren A-Z ↑</button>
            <button onclick="processSort('desc')">Sortieren Z-A ↓</button>
            <label style="font-weight: normal; margin: 0; cursor: pointer;">
                <input type="checkbox" id="unique" onchange="processSort('asc')"> Duplikate entfernen
            </label>
        </div>
    </div>

    <!-- Suchen & Ersetzen mit Live-Vorschau -->
    <div class="section" style="border-left: 5px solid var(--primary);">
        <label>2. Suchen & Ersetzen <span id="matchCounter" class="counter-badge">0 Treffer</span></label>
        <div class="replace-box">
            <input type="text" id="findText" placeholder="Suchen nach..." oninput="updatePreview()">
            <span>➔</span>
            <input type="text" id="replaceText" placeholder="Ersetzen durch...">
            <button onclick="runReplace()">Alle ersetzen</button>
        </div>
        <div class="highlight-info" id="previewInfo">Tippen Sie einen Suchbegriff ein, um Treffer zu zählen.</div>
    </div>

    <!-- Ergebnis-Sektion -->
    <div class="section">
        <label for="output">3. Ergebnis:</label>
        <textarea id="output" readonly placeholder="Hier erscheint das Ergebnis..."></textarea>
        <button class="copy" onclick="copyToClipboard()">Ergebnis in Zwischenablage kopieren</button>
    </div>
</div>

<script>
    // Kern-Funktion zum Sortieren
    function processSort(order) {
        const inputText = document.getElementById('input').value;
        const removeDuplicates = document.getElementById('unique').checked;
        
        let lines = inputText.split(/\r?\n/).filter(line => line.trim() !== "");
        
        if (removeDuplicates) {
            lines = [...new Set(lines)];
        }

        lines.sort((a, b) => a.localeCompare(b, 'de', { sensitivity: 'base' }));
        if (order === 'desc') lines.reverse();

        document.getElementById('output').value = lines.join('\n');
        updatePreview(); // Vorschau nach Sortierung aktualisieren
    }

    // Live-Vorschau der Treffer
    function updatePreview() {
        const findValue = document.getElementById('findText').value;
        const sourceText = document.getElementById('output').value || document.getElementById('input').value;
        const counterBadge = document.getElementById('matchCounter');
        const infoBox = document.getElementById('previewInfo');

        if (!findValue) {
            counterBadge.innerText = "0 Treffer";
            counterBadge.style.background = "#e9ecef";
            infoBox.innerText = "Tippen Sie einen Suchbegriff ein, um Treffer zu zählen.";
            return;
        }

        // Suche vorbereiten (escapen von Sonderzeichen für Regex)
        const escapedFind = findValue.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        const regex = new RegExp(escapedFind, 'g');
        const matches = sourceText.match(regex);
        const count = matches ? matches.length : 0;

        counterBadge.innerText = count + (count === 1 ? " Treffer" : " Treffer");
        counterBadge.style.background = count > 0 ? "#d4edda" : "#f8d7da";
        counterBadge.style.color = count > 0 ? "#155724" : "#721c24";
        
        infoBox.innerText = count > 0 
            ? `Es wurden ${count} Stellen gefunden, die ersetzt werden können.`
            : "Keine Übereinstimmungen gefunden.";
    }

    // Ersetzen ausführen
    function runReplace() {
        const find = document.getElementById('findText').value;
        const replace = document.getElementById('replaceText').value;
        const outputField = document.getElementById('output');
        const inputField = document.getElementById('input');

        if (!find) {
            alert("Bitte geben Sie an, was gesucht werden soll.");
            return;
        }

        let currentText = outputField.value || inputField.value;
        const newText = currentText.replaceAll(find, replace);
        
        outputField.value = newText;
        updatePreview(); // Anzeige nach Ersetzung aktualisieren
    }

    // Kopier-Funktion
    async function copyToClipboard() {
        const output = document.getElementById('output');
        if (!output.value) return;

        try {
            await navigator.clipboard.writeText(output.value);
            const originalBtnText = document.querySelector('.copy').innerText;
            document.querySelector('.copy').innerText = "✓ Erfolgreich kopiert!";
            setTimeout(() => {
                document.querySelector('.copy').innerText = originalBtnText;
            }, 2000);
        } catch (err) {
            // Fallback für ältere Browser
            output.select();
            document.execCommand('copy');
            alert("Kopiert!");
        }
    }
</script>

</body>
</html>
<script></script></body>
    </html>
