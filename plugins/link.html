<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>MD Link Formatierer</title>
    <style>
        html {background-color: #0e0e0e;}
        body {background-color: #1e1e1e; color: white; border-radius: 10px; border: 1px solid black;}
        .link-container { padding: 15px; font-family: sans-serif; border-radius: 10px; background-color: #3e3e3e; border: 1px solid black;}
        input { display: block; margin-bottom: 10px; width: 100%; padding: 8px; box-sizing: border-box; border-radius: 10px; background-color: #9e9e9e; border: 1px solid black;}
        #output { background-color: #eee; padding: 10px; font-family: monospace; cursor: copy; border-radius: 10px; background-color: #7e7e7e; border: 1px solid black;}
    </style>
</head>
<body>
    <div class="link-container">
        <label for="linkText">Link Text:</label>
        <input type="text" id="linkText" oninput="generateLink()">
        <label for="linkUrl">Angezeigter Text:</label>
        <input type="text" id="linkUrl" oninput="generateLink()">
        <div id="output" onclick="copyToClipboard()">[Text](URL)</div>
    </div>

    <script>
        function generateLink() {
            const text = document.getElementById('linkText').value;
            const url = document.getElementById('linkUrl').value;
            const output = document.getElementById('output');
            output.textContent = `[${text || 'Text'}](${url || 'URL'})`;
        }
        function copyToClipboard() {
            const output = document.getElementById('output');
            navigator.clipboard.writeText(output.textContent).then(() => {
                alert('Markdown-Link kopiert!');
            });
        }
        window.onload = generateLink;
    </script>
</body>
</html>
<script></script></body>
