<script>
console.log('Sie haben eine Datei geöffnet die sie nicht öffnen dürfen')
// 1. Den aktuellen Wert aus dem Local Storage abrufen
let currentCount = localStorage.getItem('404+r');

// 2. Falls der Wert noch nicht existiert (beim ersten Mal), auf 0 setzen
if (currentCount === null) {
    currentCount = 0;
}

// 3. Den Wert um 1 erhöhen
let newCount = parseInt(currentCount) + 1;

// 4. Den neuen Wert zurück in den Local Storage speichern
localStorage.setItem('404+r', newCount);

// Optional: Den Wert in der Konsole anzeigen
console.log("Sie wurden schon " + newCount + " mal auf diese Seite geschickt weil sie eine Entwickler datei öffnen wollten!");

</script>
