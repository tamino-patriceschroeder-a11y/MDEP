      <body><!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Hacker OS - Ultimate Typer</title>
    <style>
        body { background: black; color: #00FF00; font-family: 'Courier New', monospace; margin: 0; overflow: hidden; height: 100vh; }
        #desktop { width: 100%; height: 100%; position: relative; }
        #menu { background: #111; padding: 10px; border-bottom: 1px solid #333; display: flex; gap: 15px; z-index: 1000; position: relative; }
        
        .window {
            position: absolute; background: rgba(0, 20, 0, 0.95); border: 1px solid #00FF00;
            min-width: 300px; box-shadow: 0 0 15px rgba(0, 255, 0, 0.2); display: flex; flex-direction: column;
        }
        .window-header {
            background: #004400; padding: 5px 10px; cursor: move; display: flex; justify-content: space-between; font-weight: bold;
        }
        .close-btn { cursor: pointer; color: red; }
        .window-content { padding: 15px; flex-grow: 1; font-size: 13px; overflow-y: auto; max-height: 400px; }

        #main-typer { width: 60%; height: 50%; top: 80px; left: 20px; }
        .progress-bar { width: 100%; border: 1px solid #00FF00; height: 20px; margin-top: 10px; }
        .progress-fill { background: #00FF00; height: 100%; width: 0%; transition: width 0.1s; }
        
        input, button, select { background: #002200; color: #00FF00; border: 1px solid #00FF00; cursor: pointer; font-family: inherit; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div id="menu">
    <button onclick="addWindow('Stole Data', 'download')">📡 Stole Data</button>
    <button onclick="addWindow('Server Connection 1', 'connect')">🔌 Server 1</button>
    <button onclick="addWindow('Server Connection 2', 'connect')">🔌 Server 2</button>
    <input type="file" id="fileInput" style="width: 150px">
    <input type="color" id="colorPicker" value="#00FF00">
    <button id="autoBtn">Auto-Writer: AUS</button>
</div>

<div id="desktop">
    <!-- Der Haupt-Typer (immer da) -->
    <div id="main-typer" class="window">
        <div class="window-header"><span>MAIN_TERMINAL.EXE</span></div>
        <div id="console" class="window-content" tabindex="0">Klicke hier und tippe...</div>
    </div>
</div>

<script>
    const consoleElem = document.getElementById('console');
    const desktop = document.getElementById('desktop');
    let sourceCode = "import os\nimport sys\n# INITIALIZING MASTER EXPLOIT...\ndef root_access():\n    print('Bypassing Kernel...')\n    return 'ACCESS_GRANTED'\n\nroot_access()";
    let index = 0, isAuto = false, autoInt;

    // --- FENSTER SYSTEM ---
    function addWindow(title, type) {
        const win = document.createElement('div');
        win.className = 'window';
        win.style.left = (Math.random() * 40 + 20) + '%';
        win.style.top = (Math.random() * 40 + 10) + '%';
        
        let content = '';
        if(type === 'download') {
            content = `<div>Target: Classified_Server_Alpha</div><div class="progress-bar"><div class="progress-fill" id="bar"></div></div><div id="status">Stealing files...</div>`;
        } else {
            content = `<div>Connecting to 192.168.${Math.floor(Math.random()*255)}.1...</div><div class='blink'>Searching for open ports...</div>`;
        }

        win.innerHTML = `<div class="window-header"><span>${title}</span><span class="close-btn" onclick="this.parentElement.parentElement.remove()">[X]</span></div><div class="window-content">${content}</div>`;
        desktop.appendChild(win);
        makeDraggable(win);

        if(type === 'download') {
            let p = 0;
            const b = win.querySelector('.progress-fill');
            const s = win.querySelector('#status');
            const itv = setInterval(() => {
                p += Math.random() * 5;
                if(p >= 100) { p = 100; clearInterval(itv); s.innerText = "DATA BREACH SUCCESSFUL!"; s.style.color = "white"; }
                b.style.width = p + "%";
            }, 200);
        }
    }

    // --- DRAG & DROP LOGIK ---
    function makeDraggable(el) {
        let pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
        el.querySelector('.window-header').onmousedown = (e) => {
            pos3 = e.clientX; pos4 = e.clientY;
            document.onmouseup = () => { document.onmouseup = null; document.onmousemove = null; };
            document.onmousemove = (e) => {
                pos1 = pos3 - e.clientX; pos2 = pos4 - e.clientY;
                pos3 = e.clientX; pos4 = e.clientY;
                el.style.top = (el.offsetTop - pos2) + "px";
                el.style.left = (el.offsetLeft - pos1) + "px";
            };
        };
    }
    makeDraggable(document.getElementById('main-typer'));

    // --- TYPER LOGIK ---
    document.getElementById('fileInput').onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (ev) => { sourceCode = ev.target.result; index = 0; consoleElem.innerText = ""; };
        reader.readAsText(e.target.files[0]);
    };

    function type() {
        if (index >= sourceCode.length) index = 0;
        consoleElem.innerText += sourceCode.slice(index, index + 3);
        index += 3;
        consoleElem.scrollTop = consoleElem.scrollHeight;
        if (Math.random() > 0.98) {
    consoleElem.innerHTML += '<span style="color:red;"> [CRITICAL_ERROR_OVERRIDE] </span>';
}
    }

    window.onkeydown = (e) => { if(!isAuto && e.key.length === 1) type(); };
    document.getElementById('autoBtn').onclick = function() {
        isAuto = !isAuto;
        this.innerText = isAuto ? "Auto-Writer: AN" : "Auto-Writer: AUS";
        if(isAuto) autoInt = setInterval(type, 50); else clearInterval(autoInt);
    };

    document.getElementById('colorPicker').oninput = (e) => {
        document.body.style.color = e.target.value;
        document.querySelectorAll('.window').forEach(w => w.style.borderColor = e.target.value);
    };
    
    window.addEventListener('keydown', (e) => {
    if (e.key.toLowerCase() === 'x') {
        document.body.style.filter = "invert(1) hue-rotate(180deg)";
        document.body.style.transform = "skewX(5deg) scale(1.1)";
        
        setTimeout(() => {
            document.body.style.filter = "none";
            document.body.style.transform = "none";
        }, 150); // Nur ein kurzer Blitz
    }
});

</script>
</body>
