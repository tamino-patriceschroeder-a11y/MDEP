    20% { transform: translate(-2px,1px); }
    40% { transform: translate(2px,-1px); }
    60% { transform: translate(-1px,2px); }
    80% { transform: translate(1px,-2px); }
    100% { transform: translate(0,0); }
}

/* Blackscreen */

<script>
    function triggerBSOD() {
        const bsod = document.getElementById("fakeBSOD");
        const percent = document.getElementById("bsodPercent");
        const black = document.getElementById("blackScreen");

        bsod.style.display = "flex";

        let p = 0;
        const interval = setInterval(() => {
            p += Math.floor(Math.random() * 10) + 5;
            if (p > 100) p = 100;
            percent.textContent = p + "%";

            if (p >= 100) {
                clearInterval(interval);

                // 1 Sekunde warten, dann Bluescreen ausblenden
                setTimeout(() => {
                    bsod.style.display = "none";

                    // Blackscreen für 3 Sekunden anzeigen
                    black.style.display = "block";

                    setTimeout(() => {
                        black.style.display = "none";
                    }, 3000);

                }, 800);
            }
        }, 200);
    }

    // B drücken → 1 Sekunde später BSOD
    window.addEventListener("keydown", (e) => {
        if (e.key.toLowerCase() === "b") {
            setTimeout(() => {
                triggerBSOD();
            }, 1000);
        }
    });
