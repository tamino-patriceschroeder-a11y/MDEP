<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Kontrastprüfer (WCAG)</title>
    <style>
        html{background-color: #0e0e0e;}
        body {background-color: #1e1e1e; color: white; font-family: arial; border-radius: 10px; background-color: #3e3e3e; padding: 5px;}
        .checker-container { padding: 15px; font-family: arial; border-radius: 10px;}
        input[type="color"], input[type="text"] { padding: 5px; margin: 5px 0; text-align: center; font-size: 20px;}
        #previewBox { width: 100%; height: 50px; margin-top: 10px; display: flex; align-items: center; justify-content: center; }
        #result { margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="checker-container">
        Hintergrund: <input type="color" id="bgCol" value="#FFFFFF" oninput="checkContrast()"> <br>
        Textfarbe: <input type="color" id="textCol" value="#000000" oninput="checkContrast()">
        <input type="text" id="previewBox" value="Vorschau Text"></div>
        <div id="result"></div>
    </div>

    <script>
        // Vereinfachte Kontrastberechnung (reines JS)
        function getLuminance(hexcolor) {
            const rgb = parseInt(hexcolor.substring(1), 16);
            const r = (rgb >> 16) & 0xff;
            const g = (rgb >>  8) & 0xff;
            const b = (rgb >>  0) & 0xff;
            const L = [r, g, b].map(v => {
                v /= 255;
                return v <= 0.03928 ? v / 12.96 : Math.pow((v + 0.055) / 1.055, 2.4);
            });
            return 0.2126 * L[0] + 0.7152 * L[1] + 0.0722 * L[2];
        }

        function checkContrast() {
            const bg = document.getElementById('bgCol').value;
            const textC = document.getElementById('textCol').value;
            const preview = document.getElementById('previewBox');
            const resultDiv = document.getElementById('result');

            preview.style.backgroundColor = bg;
            preview.style.color = textC;

            const lum1 = getLuminance(bg);
            const lum2 = getLuminance(textC);
            const ratio = (Math.max(lum1, lum2) + 0.05) / (Math.min(lum1, lum2) + 0.05);

            resultDiv.textContent = `Kontrastverhältnis: ${ratio.toFixed(2)}:1. Empfohlen > 4.5:1`;
            if (ratio >= 4.5) {
                resultDiv.style.color = 'green';
            } else {
                resultDiv.style.color = 'red';
            }
        }
        // Initialer Check beim Laden
        window.onload = checkContrast;
    </script>
</body>
</html>
<script></script></body>
