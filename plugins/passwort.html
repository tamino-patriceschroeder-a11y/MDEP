<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Passwort Playground Extended</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
      transition: background 0.5s, color 0.5s;
    }

    body.light {
      background: linear-gradient(135deg, #f0f0f0, #dcdcdc);
      color: #222;
    }

    body.dark {
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      color: #fff;
    }

    h2 {
      margin-bottom: 10px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
    }

    input[type="text"], input[type="number"] {
      padding: 10px;
      border-radius: 6px;
      border: none;
      margin: 5px;
      width: 250px;
      font-size: 14px;
      outline: none;
      box-shadow: inset 0 0 5px rgba(0,0,0,0.3);
    }

    button {
      padding: 10px 15px;
      margin: 5px;
      border: none;
      border-radius: 6px;
      background: #ff9800;
      color: #fff;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
      box-shadow: 0 4px 6px rgba(0,0,0,0.3);
    }

    button:hover {
      background: #e68900;
      transform: scale(1.05);
    }

    #feedback {
      margin-top: 10px;
      padding: 10px;
      border-radius: 6px;
      font-weight: bold;
      width: 280px;
      text-align: center;
    }

    .rules {
      background: rgba(255,255,255,0.1);
      padding: 15px;
      border-radius: 10px;
      margin-top: 20px;
      width: 300px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.3);
    }

    label {
      display: block;
      margin: 5px 0;
    }

    /* Fortschrittsbalken */
    .strength-bar {
      width: 280px;
      height: 15px;
      border-radius: 8px;
      background: #444;
      margin-top: 10px;
      overflow: hidden;
    }

    .strength-fill {
      height: 100%;
      width: 0%;
      transition: width 0.3s;
    }

    /* Toggle Button */
    .toggle {
      margin-top: 20px;
      background: #4caf50;
    }
    .toggle:hover {
      background: #3e8e41;
    }
  </style>
</head>
<body class="dark">
  <h2>🔐 Passwort Playground Extended</h2>

  <!-- Passwort Eingabe -->
  <input type="text" id="password" placeholder="Passwort eingeben">
  <button onclick="generatePassword()">Generieren</button>
  <p id="feedback"></p>

  <!-- Fortschrittsbalken -->
  <div class="strength-bar">
    <div class="strength-fill" id="strength"></div>
  </div>

  <!-- Regeln -->
  <div class="rules">
    <h3>Regeln einstellen:</h3>
    Länge: <input type="number" id="length" value="12" min="6" max="32"><br>
    <label><input type="checkbox" id="uppercase" checked> Großbuchstaben</label>
    <label><input type="checkbox" id="numbers" checked> Zahlen</label>
    <label><input type="checkbox" id="symbols" checked> Sonderzeichen</label>
  </div>

  <!-- Dark/Light Toggle -->
  <button class="toggle" onclick="toggleMode()">🌗 Dark/Light Mode</button>

  <script>
    const input = document.getElementById("password");
    const feedback = document.getElementById("feedback");
    const strengthBar = document.getElementById("strength");
    const body = document.body;

    input.addEventListener("input", validate);

    function validate() {
      const pw = input.value;
      let score = 0;

      if (pw.length >= document.getElementById("length").value) score++;
      if (document.getElementById("uppercase").checked && /[A-Z]/.test(pw)) score++;
      if (document.getElementById("numbers").checked && /[0-9]/.test(pw)) score++;
      if (document.getElementById("symbols").checked && /[!@#$%^&*]/.test(pw)) score++;

      if (score === 4) {
        feedback.textContent = "✅ Starkes Passwort!";
        feedback.className = "valid";
      } else {
        feedback.textContent = "❌ Noch nicht alle Regeln erfüllt";
        feedback.className = "invalid";
      }

      let percent = (score / 4) * 100;
      strengthBar.style.width = percent + "%";

      if (percent <= 25) {
        strengthBar.style.background = "red";
      } else if (percent <= 75) {
        strengthBar.style.background = "orange";
      } else {
        strengthBar.style.background = "limegreen";
      }
    }

    function generatePassword() {
      let chars = "abcdefghijklmnopqrstuvwxyz";
      if (document.getElementById("uppercase").checked) chars += "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
      if (document.getElementById("numbers").checked) chars += "0123456789";
      if (document.getElementById("symbols").checked) chars += "!@#$%^&*";

      let length = parseInt(document.getElementById("length").value);
      let pw = "";
      for (let i = 0; i < length; i++) {
        pw += chars.charAt(Math.floor(Math.random() * chars.length));
      }
      input.value = pw;
      validate();
    }

    function toggleMode() {
      if (body.classList.contains("dark")) {
        body.classList.remove("dark");
        body.classList.add("light");
      } else {
        body.classList.remove("light");
        body.classList.add("dark");
      }
    }
  </script>
</body>
</html>
