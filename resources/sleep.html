<script>
        function createOverlay() {
            const overlay = document.createElement("div");
            overlay.className = "overlay";
            //overlay.innerText = "Zieh mich!";
            
            // Zufällige Startposition
            overlay.style.top = (Math.random() * 300 + 100) + "px";
            overlay.style.left = (Math.random() * 300 + 50) + "px";
            
            document.body.appendChild(overlay);
            makeElementDraggable(overlay);
        }

        // Alle Elemente mit der Klasse "overlay" entfernen
        function removeAllOverlays() {
            const overlays = document.querySelectorAll(".overlay");
            overlays.forEach(el => el.remove());
        }

        // Logik zum Verschieben (Drag & Drop)
        function makeElementDraggable(elmnt) {
            let pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;

            elmnt.onmousedown = function(e) {
                e.preventDefault();
                // Startposition der Maus
                pos3 = e.clientX;
                pos4 = e.clientY;
                document.onmouseup = closeDragElement;
                document.onmousemove = elementDrag;
            };

            function elementDrag(e) {
                e.preventDefault();
                // Neue Position berechnen
                pos1 = pos3 - e.clientX;
                pos2 = pos4 - e.clientY;
                pos3 = e.clientX;
                pos4 = e.clientY;
                // Element verschieben
                elmnt.style.top = (elmnt.offsetTop - pos2) + "px";
                elmnt.style.left = (elmnt.offsetLeft - pos1) + "px";
            }

            function closeDragElement() {
                document.onmouseup = null;
                document.onmousemove = null;
            }
        }
    </script>
<script>
function toggleSound(soundId) {
  // 1. Finde das Audio-Element und den zugehörigen Button anhand der ID
  const audioPlayer = document.getElementById('audio-' + soundId);
  const soundButton = document.getElementById('button-' + soundId);

  if (!audioPlayer || !soundButton) {
    console.error("Audio- oder Button-Element nicht gefunden für ID:", soundId);
    return;
  }

  // 2. Prüfe den aktuellen Status des Audio-Players
  if (audioPlayer.paused) {
    // Wenn es pausiert ist, starte es und ändere den Button-Text zu 'Stop'
    audioPlayer.play();
    soundButton.textContent = 'Stop';

    // Optional: Füge einen Event-Listener hinzu, um den Button automatisch wieder auf 'Play' zu stellen, 
    // sobald die Wiedergabe beendet ist.
    audioPlayer.onended = function() {
      soundButton.textContent = 'Play';
    };

  } else {
    // Wenn es gerade spielt, stoppe es, setze die Zeit zurück und ändere den Button-Text zu 'Play'
    audioPlayer.pause();
    audioPlayer.currentTime = 0; // Setzt den Sound an den Anfang zurück
    soundButton.textContent = 'Play';
  }
}
</script>
